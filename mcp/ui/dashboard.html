<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token-WUEr Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a1628; color: #c8dce8;
    font-family: 'Courier New', monospace;
    min-height: 100vh; overflow-x: hidden;
  }
  #bg-canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 48px 24px 64px; position: relative; z-index: 1; }
  .nav {
    display: flex; gap: 8px; justify-content: flex-end; padding: 16px 24px 0;
    position: relative; z-index: 1;
  }
  .nav a {
    color: #5b9ec4; text-decoration: none; font-size: 11px;
    padding: 4px 12px; border: 1px solid #3a6b8c; border-radius: 4px;
  }
  .nav a:hover, .nav a.active { background: #162d40; color: #85c1e9; }
  .hero {
    text-align: center; padding: 32px 0 48px;
    animation: fadeUp 0.6s ease-out;
  }
  .hero-canvas-wrap { display: inline-block; margin-bottom: 16px; position: relative; }
  .hero-glow {
    position: absolute; inset: -20px; border-radius: 50%;
    background: radial-gradient(circle, rgba(79,168,216,0.15), transparent 70%);
  }
  .hero-total { font-size: 42px; font-weight: bold; color: #85c1e9; margin: 8px 0; }
  .hero-since { font-size: 12px; color: #5b9ec4; }
  .hero-count { font-size: 12px; color: #5b9ec4; margin-top: 4px; }
  .hero-detail { font-size: 12px; color: #4a8ab0; margin-top: 4px; }
  .section { margin-top: 48px; }
  .section-header {
    border-bottom: 1px solid #1a3550; padding-bottom: 8px; margin-bottom: 20px;
    font-size: 11px; letter-spacing: 2px; color: #4a8ab0;
  }
  .empty { text-align: center; padding: 32px; color: #4a6b80; font-size: 12px; }

  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; animation: fadeUp 0.4s ease-out; }
  .bar-label { width: 120px; font-size: 11px; color: #8ec8e8; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 20px; background: #0d2235; border-radius: 4px; overflow: hidden; }
  .bar-fill {
    height: 100%; border-radius: 4px;
    transition: width 0.8s ease-out;
  }
  .bar-value { width: 80px; font-size: 11px; color: #85c1e9; }

  .equiv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
  .equiv-card {
    background: #0d2235; border: 1px solid #1a3550; border-radius: 8px;
    padding: 16px; text-align: center;
    animation: fadeUp 0.4s ease-out;
  }
  .equiv-card canvas { image-rendering: pixelated; margin-bottom: 8px; }
  .equiv-number { font-size: 16px; color: #85c1e9; font-weight: bold; }
  .equiv-label { font-size: 11px; color: #5b9ec4; margin-top: 4px; }

  .footer { margin-top: 64px; text-align: center; padding: 24px 0; border-top: 1px solid #1a3550; }
  .footer-cite { font-size: 11px; color: #4a6b80; margin-bottom: 12px; }
  .footer-btn {
    background: #162d40; border: 1px solid #3a6b8c; border-radius: 4px;
    color: #8ec8e8; padding: 6px 16px; font-family: inherit; font-size: 11px; cursor: pointer;
  }
  .footer-btn:hover { background: #1a3550; }

  .sessions-list { display: flex; flex-direction: column; gap: 8px; }
  .session-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; background: #0d2235; border-radius: 6px;
    font-size: 12px;
    animation: fadeUp 0.4s ease-out;
  }
  .session-name { flex: 1; color: #c8dce8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-water { color: #85c1e9; font-weight: bold; min-width: 70px; text-align: right; }
  .session-date { color: #4a6b80; font-size: 10px; min-width: 90px; text-align: right; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="nav">
  <a href="/" class="active">Dashboard</a>
  <a href="/bottle">Bottle</a>
</div>

<div class="wrap" id="root">
  <div class="hero" style="text-align:center;padding:60px 0;">
    <p style="color:#4a6b80;font-size:13px;">Loading...</p>
  </div>
</div>

<script>
const W = 32, H = 32;
const SPRITES = {};

function makeSprite(palette, fillGrid) {
  const grid = new Uint8Array(W * H);
  fillGrid(grid);
  return { grid, palette, width: W, height: H };
}

function rect(g, x, y, w, h, color) {
  for (let r = y; r < y + h && r < H; r++)
    for (let c = x; c < x + w && c < W; c++)
      g[r * W + c] = color;
}
function circ(g, cx, cy, r, color) {
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++)
      if (Math.sqrt((x - cx) ** 2 + (y - cy) ** 2) <= r)
        g[y * W + x] = color;
}

SPRITES.bottle = makeSprite(['#00000000','#3a6b8c','#5b9ec4','#2d5a7a','#8ec8e8'], g => {
  rect(g,13,2,6,3,1); rect(g,12,5,8,2,1); rect(g,13,7,6,2,2);
  rect(g,9,9,2,18,1); rect(g,21,9,2,18,1); rect(g,8,10,4,15,3);
  rect(g,20,10,4,15,2); rect(g,10,25,12,2,1); rect(g,12,18,8,1,4);
  rect(g,12,21,8,1,4); circ(g,16,16,4,2);
});

SPRITES.plant = makeSprite(['#00000000','#2d5a1e','#4a8c2a','#6aad3a','#8b5e3c'], g => {
  rect(g,13,20,6,12,4); rect(g,11,18,10,3,4); rect(g,14,8,4,12,1);
  rect(g,9,10,5,4,2); rect(g,18,12,5,4,3); rect(g,15,6,3,3,2);
});

SPRITES.tea = makeSprite(['#00000000','#ffffff','#ffd700','#e8d5b7','#8b5e3c','#d4a574','#3cb371'], g => {
  rect(g,9,12,14,14,1); rect(g,7,10,18,4,1); rect(g,23,15,5,3,1);
  rect(g,11,14,10,8,4); rect(g,13,4,1,8,5); rect(g,16,6,1,6,5);
  rect(g,19,3,1,5,5); rect(g,10,11,12,1,2);
});

SPRITES.ramen = makeSprite(['#00000000','#ffffff','#ffd700','#e8d5b7','#8b5e3c','#ff6347','#3cb371'], g => {
  rect(g,6,10,20,16,4); rect(g,4,8,24,4,1); rect(g,8,12,16,4,5);
  rect(g,10,10,3,3,2); rect(g,17,11,6,2,3); rect(g,14,14,2,5,6);
  rect(g,12,2,1,7,1); rect(g,16,3,1,6,1); rect(g,20,1,1,5,1); rect(g,5,9,22,1,2);
});

SPRITES.cloud = makeSprite(['#00000000','#ffffff','#e8e8e8','#d0d0d0','#c8e0f0'], g => {
  for (let y=4;y<22;y++) for (let x=2;x<30;x++) {
    if ((x-16)**2/196 + (y-14)**2/100 < 0.85) g[y*W+x] = 1;
  }
  rect(g,6,5,8,4,2); rect(g,18,6,10,3,2); rect(g,10,18,12,4,3);
});

function renderSprite(ctx, sprite, x, y, scale) {
  for (let r=0;r<sprite.height;r++)
    for (let c=0;c<sprite.width;c++) {
      const ci = sprite.grid[r*sprite.width+c];
      if (ci===0) continue;
      const color = sprite.palette[ci];
      if (color==='#00000000') continue;
      ctx.fillStyle = color;
      ctx.fillRect(x+c*scale, y+r*scale, scale, scale);
    }
}

function formatVolume(ml) {
  if (ml >= 1000) return (ml/1000).toFixed(1) + ' L';
  return ml.toFixed(0) + ' ml';
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}

const EQUIV_DEFS = [
  { sprite: 'bottle', label: 'Water bottles', divisor: 500 },
  { sprite: 'tea', label: 'Cups of tea', divisor: 250 },
  { sprite: 'ramen', label: 'Ramen bowls', divisor: 500 },
  { sprite: 'plant', label: 'Plant waterings', divisor: 200 },
  { sprite: 'cloud', label: 'Cloud masses (g)', divisor: 1 },
];

const PROJECT_COLORS = ['#2d6a9f','#4fa8d8','#1a5c3a','#f4a261','#e76f51','#b5838d','#6d597a','#4a5759'];

// Background particles
(function() {
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  function resize() { c.width=window.innerWidth; c.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const drops = [];
  for (let i=0;i<50;i++) drops.push({ x:Math.random()*c.width, y:Math.random()*c.height, speed:0.2+Math.random()*0.6, size:1+Math.random()*1.5, alpha:0.1+Math.random()*0.15 });
  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    for (const d of drops) {
      d.y += d.speed;
      if (d.y>c.height) { d.y=-10; d.x=Math.random()*c.width; }
      ctx.fillStyle = `rgba(79,168,216,${d.alpha})`;
      ctx.fillRect(Math.round(d.x),Math.round(d.y),d.size,d.size*2+1);
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

async function load() {
  const root = document.getElementById('root');
  try {
    const res = await fetch('/api/projects');
    const projects = await res.json();
    renderDashboard(root, projects);
  } catch (err) {
    root.innerHTML = `<div class="hero" style="text-align:center;padding:60px 0;"><p style="color:#e76f51;font-size:13px;">Could not connect to token-wuer server.<br>Start the MCP server first.</p></div>`;
  }
}

function renderDashboard(root, projects) {
  if (!projects.length) {
    root.innerHTML = `
      <div class="hero" style="text-align:center;padding:60px 0;">
        <p style="color:#8ec8e8;font-size:18px;">No projects tracked yet</p>
        <p style="color:#4a6b80;font-size:12px;margin-top:8px;">Start coding with an agent that has token_wuer_log enabled.</p>
      </div>`;
    return;
  }

  const totalMl = projects.reduce((s,p) => s + p.totals.waterMl, 0);
  const totalTokens = projects.reduce((s,p) => s + p.totals.tokens, 0);
  const firstDate = projects.reduce((e,p) => p.createdAt < e ? p.createdAt : e, projects[0].createdAt);

  root.innerHTML = '';

  // Hero
  root.appendChild(renderHero(totalMl, totalTokens, projects.length, firstDate));

  // Projects
  root.appendChild(renderSection('PROJECTS', renderProjects(projects, totalMl)));

  // Equivalents
  root.appendChild(renderSection('UNDER A DIFFERENT LIGHT', renderEquivalents(totalMl)));

  // Recent sessions (from first few projects)
  root.appendChild(renderSection('RECENT PROJECTS', renderRecent(projects)));

  // Footer
  root.appendChild(renderFooter());
}

function renderHero(ml, tokens, count, firstDate) {
  const hero = document.createElement('div');
  hero.className = 'hero';

  const wrap = document.createElement('div');
  wrap.className = 'hero-canvas-wrap';
  const glow = document.createElement('div');
  glow.className = 'hero-glow';
  wrap.appendChild(glow);
  const canvas = document.createElement('canvas');
  canvas.width = 96; canvas.height = 96;
  canvas.style.cssText = 'image-rendering:pixelated;position:relative;z-index:1;';
  const ctx = canvas.getContext('2d');
  if (ctx) {
    renderSprite(ctx, SPRITES.bottle, 32, 14, 1);
    if (ml > 0) {
      const maxMl = 5000;
      const fillPct = Math.min(ml / maxMl, 1);
      const fillH = Math.floor(fillPct * 48);
      if (fillH > 1) {
        const fc = document.createElement('canvas');
        fc.width = 96; fc.height = 96;
        const fctx = fc.getContext('2d');
        fctx.fillStyle = '#4fa8d8';
        fctx.fillRect(32, 14 + 48 - fillH, 32, fillH);
        ctx.drawImage(fc, 0, 0);
      }
    }
  }
  wrap.appendChild(canvas);
  hero.appendChild(wrap);

  const total = document.createElement('div');
  total.className = 'hero-total';
  total.textContent = '\u{1F4A7} ' + formatVolume(ml);
  hero.appendChild(total);

  if (firstDate) {
    const since = document.createElement('div');
    since.className = 'hero-since';
    since.textContent = 'since ' + formatDate(firstDate);
    hero.appendChild(since);
  }

  const countEl = document.createElement('div');
  countEl.className = 'hero-count';
  countEl.textContent = count + ' project' + (count !== 1 ? 's' : '');
  hero.appendChild(countEl);

  if (ml >= 1) {
    const detail = document.createElement('div');
    detail.className = 'hero-detail';
    detail.textContent = (ml/1000).toFixed(2) + ' L water · ' + tokens.toLocaleString() + ' tokens';
    hero.appendChild(detail);
  }

  return hero;
}

function renderSection(title, content) {
  const sec = document.createElement('div');
  sec.className = 'section';
  const header = document.createElement('div');
  header.className = 'section-header';
  header.textContent = title;
  sec.appendChild(header);
  sec.appendChild(content);
  return sec;
}

function renderProjects(projects, maxVal) {
  const wrap = document.createElement('div');
  const sorted = [...projects].sort((a,b) => b.totals.waterMl - a.totals.waterMl);
  const barMax = Math.max(maxVal, 1);
  sorted.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'bar-row';
    const label = document.createElement('div');
    label.className = 'bar-label';
    label.textContent = p.name;
    row.appendChild(label);
    const track = document.createElement('div');
    track.className = 'bar-track';
    const fill = document.createElement('div');
    fill.className = 'bar-fill';
    fill.style.width = ((p.totals.waterMl / barMax) * 100) + '%';
    fill.style.animationDelay = (0.1 + i * 0.08) + 's';
    fill.style.background = PROJECT_COLORS[i % PROJECT_COLORS.length];
    track.appendChild(fill);
    row.appendChild(track);
    const val = document.createElement('div');
    val.className = 'bar-value';
    val.textContent = formatVolume(p.totals.waterMl);
    row.appendChild(val);
    wrap.appendChild(row);
  });
  return wrap;
}

function renderEquivalents(ml) {
  if (ml <= 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'Start coding to see your water in a new light';
    return empty;
  }
  const grid = document.createElement('div');
  grid.className = 'equiv-grid';

  const qualified = EQUIV_DEFS.map(def => ({
    ...def, value: Math.round(ml / def.divisor * 100) / 100
  })).filter(e => e.value >= 0.01).sort((a,b) => b.value - a.value).slice(0, 6);

  qualified.forEach((eq, i) => {
    const card = document.createElement('div');
    card.className = 'equiv-card';
    card.style.animationDelay = (0.1 + i * 0.08) + 's';
    const c = document.createElement('canvas');
    c.width = 32; c.height = 32;
    c.style.cssText = 'image-rendering:pixelated;margin-bottom:8px;';
    const ctx = c.getContext('2d');
    renderSprite(ctx, SPRITES[eq.sprite], 0, 0, 1);
    card.appendChild(c);
    const num = document.createElement('div');
    num.className = 'equiv-number';
    num.textContent = '\u2248 ' + (eq.value >= 1000 ? eq.value.toLocaleString('en-US', {maximumFractionDigits:0}) : eq.value.toFixed(1).replace(/\.0$/,''));
    card.appendChild(num);
    const label = document.createElement('div');
    label.className = 'equiv-label';
    label.textContent = eq.label;
    card.appendChild(label);
    grid.appendChild(card);
  });
  return grid;
}

function renderRecent(projects) {
  const wrap = document.createElement('div');
  wrap.className = 'sessions-list';
  const sorted = [...projects].sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt)).slice(0, 10);
  sorted.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'session-row';
    row.style.animationDelay = (0.1 + i * 0.05) + 's';
    const name = document.createElement('div');
    name.className = 'session-name';
    name.textContent = p.name + ' (' + p.platform + ')';
    row.appendChild(name);
    const water = document.createElement('div');
    water.className = 'session-water';
    water.textContent = formatVolume(p.totals.waterMl);
    row.appendChild(water);
    const date = document.createElement('div');
    date.className = 'session-date';
    date.textContent = formatDate(p.updatedAt);
    row.appendChild(date);
    wrap.appendChild(row);
  });
  return wrap;
}

function renderFooter() {
  const footer = document.createElement('div');
  footer.className = 'footer';
  const cite = document.createElement('div');
  cite.className = 'footer-cite';
  cite.textContent = '1 token = 0.003 ml water (inference only)';
  footer.appendChild(cite);
  const btn = document.createElement('button');
  btn.className = 'footer-btn';
  btn.textContent = 'Export as JSON';
  btn.addEventListener('click', async () => {
    try {
      const res = await fetch('/api/projects');
      const data = await res.json();
      const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'token-wuer-export-' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
      URL.revokeObjectURL(url);
    } catch {}
  });
  footer.appendChild(btn);
  return footer;
}

load();
</script>
</body>
</html>
